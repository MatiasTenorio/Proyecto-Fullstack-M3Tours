spring.application.name=empresas
spring.datasource.url=jdbc:mysql://localhost:5506/M3_tours?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
# spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port=8088
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Habilitar Flyway
spring.flyway.enabled=true
# Ruta donde buscarás los scripts SQL
spring.flyway.locations=classpath:db/migration
# Importante si ya tienes datos en la BD y no quieres empezar de cero
spring.flyway.baseline-on-migrate=true